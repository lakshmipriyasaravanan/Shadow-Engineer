apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: shadow-engineer-ingress
  namespace: shadow-engineer
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}, {"HTTP":80}]'
    alb.ingress.kubernetes.io/certificate-arn: ${ACM_CERTIFICATE_ARN}
spec:
  rules:
    - host: app.shadowengineer.com
      http:
        paths:
          - path: /api/v1/repositories
            pathType: Prefix
            backend:
              service:
                name: core-service
                port:
                  number: 80
          - path: /api/v1/ai
            pathType: Prefix
            backend:
              service:
                name: ai-service
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-app
                port:
                  number: 80
