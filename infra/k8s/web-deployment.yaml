apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app
  namespace: shadow-engineer
  labels:
    app: web-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: web-app
  template:
    metadata:
      labels:
        app: web-app
    spec:
      containers:
      - name: web-app
        image: ${ECR_REGISTRY}/shadow-engineer/web:latest
        ports:
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: web-config
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: web-app
  namespace: shadow-engineer
spec:
  selector:
    app: web-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
