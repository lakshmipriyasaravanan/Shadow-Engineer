apiVersion: apps/v1
kind: Deployment
metadata:
  name: core-service
  namespace: shadow-engineer
  labels:
    app: core-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: core-service
  template:
    metadata:
      labels:
        app: core-service
    spec:
      containers:
      - name: core-service
        image: ${ECR_REGISTRY}/shadow-engineer/core-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        envFrom:
        - secretRef:
            name: core-service-secrets
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1024Mi
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: core-service
  namespace: shadow-engineer
spec:
  selector:
    app: core-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
