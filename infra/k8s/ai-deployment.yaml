apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: shadow-engineer
  labels:
    app: ai-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
      - name: ai-service
        image: ${ECR_REGISTRY}/shadow-engineer/ai-service:latest
        ports:
        - containerPort: 8000
        envFrom:
        - secretRef:
            name: ai-service-secrets
        resources:
          requests:
            cpu: 500m
            memory: 1024Mi
          limits:
            cpu: 2000m
            memory: 2048Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: shadow-engineer
spec:
  selector:
    app: ai-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
